apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: keyvault-mcp-router
  # Own namespace — not `aims` — signals the service is standalone.
  # Next lift is to its own KV vault; for now the KV secrets stay in
  # forestrat-kv but under the mcp-router-* prefix so the swap is a
  # config change, not a data migration.
  namespace: mcp
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "4cb365a7-cabf-4eb2-b686-fa9b97e94cd6"
    keyvaultName: "forestrat-kv"
    tenantId: "abb71f25-7b08-4934-afb1-1d28988d5219"
    # Router-owned secrets. Prefix `mcp-router-` on the KV side so this
    # service can be lifted to a separate vault without name collision.
    # `mcp-target-server-*` entries get appended as external teams
    # onboard MCP servers with bearer auth — discovery.py resolves them
    # from /mnt/secrets/<name>.
    objects: |
      array:
        - |
          objectName: mcp-router-postgres-dsn
          objectType: secret
        - |
          objectName: mcp-router-redis-url
          objectType: secret
        - |
          objectName: mcp-router-jwt-secret
          objectType: secret
        - |
          objectName: mcp-router-api-keys-admin
          objectType: secret
        - |
          objectName: mcp-router-api-keys-reader
          objectType: secret
  # Note: the router is a pure service-discovery / KV registry as of Jul
  # 2026 — it never resolves target-server bearers itself. Consumers
  # (e.g. aims-agent) mount the target tokens in THEIR own SPC and make
  # the MCP tool call directly. Do NOT add target-server tokens here.
  secretObjects:
    - secretName: mcp-router-secrets
      type: Opaque
      data:
        - objectName: mcp-router-postgres-dsn
          key: postgres-dsn
        - objectName: mcp-router-redis-url
          key: redis-url
        - objectName: mcp-router-jwt-secret
          key: jwt-secret
        - objectName: mcp-router-api-keys-admin
          key: api-keys-admin
        - objectName: mcp-router-api-keys-reader
          key: api-keys-reader
